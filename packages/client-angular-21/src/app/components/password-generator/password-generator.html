<section>
    <h2>Password Generator</h2>
    <div>
        <label>Enter Length</label>
        <input name="len" type="number" (input)="onChangeLen($event.target.value)" />
    </div>

    <div>
        <label>Use Symbols</label>
        <input (change)="onChangeUseSym()" type="checkbox" />
    </div>

    <div>
        <button (click)="onButtonCLick()" [disabled]="!len">Generate! </button>
    </div>


    @if (password) {
    <div *ngIf="password">
        <label>Your Password</label>
        <input [value]="password" />
        <br />
        {{password}}
    </div>
    }

</section>
